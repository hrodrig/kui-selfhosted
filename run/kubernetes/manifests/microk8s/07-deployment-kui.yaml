apiVersion: apps/v1
kind: Deployment
metadata:
  name: kui
  namespace: kui
  labels:
    app.kubernetes.io/name: kui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kui
          image: ghcr.io/hrodrig/kui:v0.1.0
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: kui
          env:
            - name: KIKO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kui-stack
                  key: KIKO_API_KEY
            - name: KUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kui-stack
                  key: KUI_ADMIN_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kui-data
        - name: tmp
          emptyDir: {}
