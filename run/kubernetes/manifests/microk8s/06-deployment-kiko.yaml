apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiko
  namespace: kui
  labels:
    app.kubernetes.io/name: kiko
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kiko
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kiko
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kiko
          image: ghcr.io/hrodrig/kiko:v0.1.0
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: kiko
          env:
            - name: KIKO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kui-stack
                  key: KIKO_API_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kiko-data
        - name: tmp
          emptyDir: {}
