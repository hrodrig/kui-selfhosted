apiVersion: v1
kind: Service
metadata:
  name: {{ include "kui-stack.kui.fullname" . }}
  labels:
    {{- include "kui-stack.kui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.kui.service.type }}
  ports:
    - port: {{ .Values.kui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kui-stack.kui.selectorLabels" . | nindent 4 }}
