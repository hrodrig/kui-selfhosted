{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kui-stack.secretName" . }}
  labels:
    {{- include "kui-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  KIKO_API_KEY: {{ required "secrets.kikoApiKey is required when secrets.create=true" .Values.secrets.kikoApiKey | quote }}
  KUI_ADMIN_PASSWORD: {{ required "secrets.kuiAdminPassword is required when secrets.create=true" .Values.secrets.kuiAdminPassword | quote }}
{{- end }}
