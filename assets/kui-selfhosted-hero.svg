<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <rect width="1200" height="400" fill="#0d1117" rx="15" ry="15"/>
  
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)" rx="15" ry="15"/>
  
  <g transform="translate(80, 180)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#c9d1d9">kui-selfhosted</text>
    <text x="5" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" fill="#8b949e">kui + kiko deployment stack</text>
    <text x="5" y="90" font-family="monospace" font-size="18" fill="#58a6ff">docker-compose · helm · microk8s</text>
  </g>

  <rect x="660" y="60" width="460" height="280" rx="15" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="680" y="90" font-family="monospace" font-size="14" fill="#8b949e">Self-hosted Environment</text>

  <g transform="translate(700, 120)">
    <rect width="160" height="80" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
    <text x="80" y="38" font-family="monospace" font-size="20" font-weight="bold" fill="#3fb950" text-anchor="middle">kiko</text>
    <text x="80" y="60" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Collector API</text>
  </g>

  <g transform="translate(700, 230)">
    <rect width="160" height="80" rx="8" fill="#0d1117" stroke="#a371f7" stroke-width="2"/>
    <text x="80" y="38" font-family="monospace" font-size="20" font-weight="bold" fill="#a371f7" text-anchor="middle">kui</text>
    <text x="80" y="60" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Analytics UI</text>
  </g>

  <g transform="translate(920, 120)">
    <rect width="160" height="190" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <text x="80" y="90" font-family="monospace" font-size="20" font-weight="bold" fill="#58a6ff" text-anchor="middle">SQLite</text>
    <text x="80" y="115" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Volumes / PVCs</text>
  </g>

  <path d="M 860 160 L 920 160" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="4,4"/>
  <path d="M 860 270 L 920 270" fill="none" stroke="#a371f7" stroke-width="2" stroke-dasharray="4,4"/>
</svg>
